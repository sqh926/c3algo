name: verify

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      COMPETITIVE_VERIFY_FILES_PATH: .competitive-verifier/verify_files.json
    steps:
      - uses: actions/checkout@v4

      - name: Install c3c
        run: |
          curl -sL https://github.com/c3lang/c3c/releases/download/v0.8.1/c3-linux.tar.gz -o c3.tar.gz
          tar xzf c3.tar.gz
          echo "$PWD/c3" >> "$GITHUB_PATH"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install competitive-verifier

      - name: Generate config
        run: python scripts/gen_verify_files.py "$COMPETITIVE_VERIFY_FILES_PATH"

      - uses: actions/cache@v4
        with:
          path: .competitive-verifier/cache
          key: verifier-${{ hashFiles('.competitive-verifier/verify_files.json') }}
          restore-keys: verifier-

      - run: competitive-verifier download
      - run: competitive-verifier verify --no-download --check-error --write-summary
